<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portaria</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="login" class="login-container">
  <div class="login-box">
    <h2>🔐 Portaria</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="senha" placeholder="Senha">
    <button onclick="login()">Entrar</button>
  </div>
</div>

<div id="app" style="display:none;">

  <aside class="sidebar">
    <h2>🏢</h2>
    <button onclick="mostrar('home')">🏠 Início</button>
    <button onclick="mostrar('moradores')">👤 Moradores</button>
    <button onclick="mostrar('visitantes')">🚶 Visitantes</button>
    <button onclick="mostrar('encomendas')">📦 Encomendas</button>
  </aside>

  <div class="main">
    <header>
      <h1 id="titulo">Dashboard</h1>
    </header>

    <section id="conteudo"></section>
  </div>

  <nav class="mobile-nav">
    <button onclick="mostrar('home')">🏠</button>
    <button onclick="mostrar('moradores')">👤</button>
    <button onclick="mostrar('visitantes')">🚶</button>
    <button onclick="mostrar('encomendas')">📦</button>
  </nav>

</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<script src="firebase.js"></script>
<script src="app.js"></script>

</body>
</html>
